# SPDX-License-Identifier: Apache-2.0

[graph]
targets = [
    { triple = "x86_64-unknown-linux-gnu" },
]
all-features = true

[advisories]
ignore = [
    # Transitive through reed-solomon-erasure -> parking_lot 0.11. It is an
    # unmaintained-crate warning, not a known vulnerability.
    { id = "RUSTSEC-2024-0384", reason = "No maintained replacement is available through reed-solomon-erasure 6" },
]

[licenses]
confidence-threshold = 0.8
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Zlib",
    "BSL-1.0",
    "CC0-1.0",
    "CDLA-Permissive-2.0",
]

[licenses.private]
ignore = false

[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
