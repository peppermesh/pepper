x-pepper: &pepper
  image: pepper-s3-throughput:local
  build:
    context: ../..
    dockerfile: system-tests/docker/Dockerfile
  environment: &environment
    PEPPER_TEST_CLUSTER_SECRET: pepper-benchmark-cluster-secret-v1
    PEPPER_TEST_S3_SECRET: pepper-benchmark-secret-v1
    PEPPER_TEST_DIRECT_API: "1"
  stop_grace_period: 30s
  # Docker's default seccomp profile blocks io_uring_setup on common releases.
  # The benchmark must exercise the native backend instead of timing a hidden
  # synchronous fallback. Production should use a narrow custom allowlist.
  security_opt:
    - seccomp=unconfined
  healthcheck:
    test: ["CMD", "curl", "--fail", "--silent", "http://127.0.0.1:9080/readyz"]
    interval: 2s
    timeout: 2s
    retries: 60
  networks:
    benchmark:

services:
  single:
    <<: *pepper
    profiles: ["single"]
    hostname: single
    ports: ["127.0.0.1:29080:9080"]
    environment:
      <<: *environment
      PEPPER_TEST_NODE_NAME: single
    command: ["/usr/local/bin/s3-contract-node", "/etc/pepper/node.toml"]
    volumes:
      - ${PEPPER_BENCH_CONFIG_DIR:?set PEPPER_BENCH_CONFIG_DIR}/single.toml:/etc/pepper/node.toml:ro
      - ${PEPPER_BENCH_ROOT:?set PEPPER_BENCH_ROOT}/single:/var/lib/pepper
      - ${PEPPER_BENCH_ROOT}/control:/control
    networks:
      benchmark:
        ipv4_address: 172.30.43.10

