name: pepper-phase0-kafka

x-kafka-common: &kafka-common
  CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
  KAFKA_PROCESS_ROLES: broker,controller
  KAFKA_CONTROLLER_QUORUM_VOTERS: 1@broker-1:9093,2@broker-2:9093,3@broker-3:9093
  KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
  KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
  KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
  KAFKA_LOG_DIRS: /var/lib/kafka/data
  KAFKA_DEFAULT_REPLICATION_FACTOR: "3"
  KAFKA_MIN_INSYNC_REPLICAS: "2"
  KAFKA_NUM_PARTITIONS: "12"
  KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "3"
  KAFKA_OFFSETS_TOPIC_NUM_PARTITIONS: "12"
  KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "3"
  KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "2"
  KAFKA_SHARE_COORDINATOR_STATE_TOPIC_REPLICATION_FACTOR: "3"
  KAFKA_SHARE_COORDINATOR_STATE_TOPIC_MIN_ISR: "2"
  KAFKA_UNCLEAN_LEADER_ELECTION_ENABLE: "false"
  KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
  KAFKA_LOG_FLUSH_INTERVAL_MESSAGES: ${KAFKA_LOG_FLUSH_INTERVAL_MESSAGES:-9223372036854775807}
  KAFKA_HEAP_OPTS: ${KAFKA_HEAP_OPTS:--Xms2g -Xmx2g}

x-kafka-service: &kafka-service
  image: apache/kafka:4.3.1@sha256:77e3df9054047a88b520d0cc46e16696d3b22022e1d580aeccd2632df6532837
  restart: "no"
  stop_grace_period: 60s
  healthcheck:
    test:
      [
        "CMD-SHELL",
        "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 >/dev/null 2>&1",
      ]
    interval: 5s
    timeout: 10s
    retries: 60
    start_period: 20s

services:
  broker-1:
    <<: *kafka-service
    container_name: pepper-phase0-kafka-1
    hostname: broker-1
    environment:
      <<: *kafka-common
      KAFKA_NODE_ID: "1"
      KAFKA_LISTENERS: INTERNAL://:9092,CONTROLLER://:9093,EXTERNAL://:19092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://broker-1:9092,EXTERNAL://localhost:19092
    ports:
      - "19092:19092"
    volumes:
      - ${KAFKA_DATA_ROOT:?set KAFKA_DATA_ROOT}/broker-1:/var/lib/kafka/data

  broker-2:
    <<: *kafka-service
    container_name: pepper-phase0-kafka-2
    hostname: broker-2
    environment:
      <<: *kafka-common
      KAFKA_NODE_ID: "2"
      KAFKA_LISTENERS: INTERNAL://:9092,CONTROLLER://:9093,EXTERNAL://:29092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://broker-2:9092,EXTERNAL://localhost:29092
    ports:
      - "29092:29092"
    volumes:
      - ${KAFKA_DATA_ROOT:?set KAFKA_DATA_ROOT}/broker-2:/var/lib/kafka/data

  broker-3:
    <<: *kafka-service
    container_name: pepper-phase0-kafka-3
    hostname: broker-3
    environment:
      <<: *kafka-common
      KAFKA_NODE_ID: "3"
      KAFKA_LISTENERS: INTERNAL://:9092,CONTROLLER://:9093,EXTERNAL://:39092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://broker-3:9092,EXTERNAL://localhost:39092
    ports:
      - "39092:39092"
    volumes:
      - ${KAFKA_DATA_ROOT:?set KAFKA_DATA_ROOT}/broker-3:/var/lib/kafka/data
