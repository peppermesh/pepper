syntax = "proto3";

package pepper.v1;

message RequestEnvelope {
  string request_id = 1;
  uint32 protocol_version = 2;
  string node_id = 3;
  string method = 4;
  bytes payload = 5;
  int64 auth_timestamp_unix_seconds = 6;
  string auth_signature_hex = 7;
  string public_key_hex = 8;
  string identity_signature_hex = 9;
}

message ResponseEnvelope {
  string request_id = 1;
  bool ok = 2;
  string error_code = 3;
  string error_message = 4;
  bytes payload = 5;
  string node_id = 6;
  string public_key_hex = 7;
  string signature_hex = 8;
}

message NodeDescriptor {
  string node_id = 1;
  string name = 2;
  repeated string addresses = 3;
  string public_key_hex = 4;
  string signature_hex = 5;
  string failure_domain = 6;
  map<string, string> placement_labels = 7;
  uint64 storage_capacity_bytes = 8;
  uint64 storage_available_bytes = 9;
  string tls_certificate_digest_hex = 10;
  bool namespace_consensus_enabled = 11;
  uint64 namespace_group_capacity = 12;
  uint64 namespace_group_count = 13;
  uint64 max_consensus_log_bytes = 14;
  uint64 max_namespace_write_rate = 15;
}

message HandshakeRequest {
  NodeDescriptor descriptor = 1;
}

message HandshakeResponse {
  NodeDescriptor descriptor = 1;
}

message NodeInfoRequest {}

message NodeInfoResponse {
  NodeDescriptor descriptor = 1;
}

message ListPeersRequest {}

message PeerInfo {
  string node_id = 1;
  string name = 2;
  repeated string addresses = 3;
  int64 last_seen_unix_seconds = 4;
  bool connected = 5;
  string failure_domain = 6;
  map<string, string> placement_labels = 7;
  uint64 storage_capacity_bytes = 8;
  uint64 storage_available_bytes = 9;
  bool namespace_consensus_enabled = 10;
  uint64 namespace_group_capacity = 11;
  uint64 namespace_group_count = 12;
  uint64 max_consensus_log_bytes = 13;
  uint64 max_namespace_write_rate = 14;
}

message ListPeersResponse {
  repeated PeerInfo peers = 1;
}

message BlockHasRequest {
  string cid = 1;
}

message BlockHasResponse {
  bool has = 1;
}

message BlockGetRequest {
  string cid = 1;
}

message BlockGetResponse {
  string cid = 1;
  string codec = 2;
  bytes payload = 3;
}

message RelayBlockGetRequest {
  string target_node_id = 1;
  string cid = 2;
}

message RelayBlockGetResponse {
  string cid = 1;
  bytes payload = 2;
}

message BlockPutReplicaRequest {
  bytes payload = 1;
  string codec = 2;
}

message BlockPutReplicaResponse {
  string cid = 1;
  string codec = 2;
  uint64 size = 3;
  bool already_existed = 4;
  string provider_record_json = 5;
}

message BlockProvidersRequest {
  string cid = 1;
}

message BlockProvidersResponse {
  repeated string provider_record_json = 1;
}

message BlockAnnounceProviderRequest {
  string provider_record_json = 1;
}

message BlockAnnounceProviderResponse {
  bool accepted = 1;
}

message PinApplyRequest {
  string pin_record_json = 1;
}

message PinApplyResponse {
  bool accepted = 1;
}

message ComputeOfferRequest {
  string spec_json = 1;
}

message ComputeOfferResponse {
  bool accepted = 1;
  string node_id = 2;
  uint64 estimated_queue_delay_seconds = 3;
  uint64 local_input_bytes = 4;
  uint64 total_input_bytes = 5;
  uint32 available_parallelism = 6;
  string rejection_reason = 7;
}

message ComputeSubmitRequest {
  string job_id = 1;
  string spec_json = 2;
}

message ComputeSubmitResponse {
  string job_status_json = 1;
}

message ComputeStatusRequest {
  string job_id = 1;
}

message ComputeStatusResponse {
  string job_status_json = 1;
}

message ComputeLogsRequest {
  string job_id = 1;
}

message ComputeLogsResponse {
  string logs_json = 1;
}

message ComputeCancelRequest {
  string job_id = 1;
}

message ComputeCancelResponse {
  string job_status_json = 1;
}

message NamespaceRpcContext {
  string namespace_id = 1;
  uint32 namespace_protocol_version = 2;
  uint64 membership_epoch = 3;
  uint64 term = 4;
  string sender_identity = 5;
  string request_id = 6;
}

message NamespaceDiscoveryRecord {
  string namespace_id = 1;
  uint32 namespace_protocol_version = 2;
  uint64 membership_epoch = 3;
  repeated string replica_node_ids = 4;
  string leader_node_id = 5;
  uint64 leader_term = 6;
  int64 expires_at_unix_seconds = 7;
  string announcer_node_id = 8;
  string signature_hex = 9;
}

message NamespaceDiscoverRequest {
  string namespace_id = 1;
}

message NamespaceDiscoverResponse {
  repeated NamespaceDiscoveryRecord records = 1;
}

message NamespaceAnnounceRequest {
  NamespaceDiscoveryRecord record = 1;
}

message NamespaceAnnounceResponse {
  bool accepted = 1;
}

message NamespaceRaftRequest {
  NamespaceRpcContext context = 1;
  bytes request_json = 2;
}

message NamespaceRaftResponse {
  bytes response_json = 1;
}

message NamespaceForwardRequest {
  NamespaceRpcContext context = 1;
  bytes command_json = 2;
}

message NamespaceForwardResponse {
  bytes response_json = 1;
  string leader_node_id = 2;
  uint64 leader_term = 3;
}

message NamespaceStateRequest {
  NamespaceRpcContext context = 1;
}

message NamespaceStateResponse {
  bytes state_json = 1;
}

message NamespaceBootstrapRequest {
  string namespace_id = 1;
  string checkpoint_cid = 2;
  uint64 membership_epoch = 3;
  bool initialize = 4;
  bool learner = 5;
  repeated string current_voters = 6;
  bool recovery = 7;
  string recovery_confirmation = 8;
}

message NamespaceBootstrapResponse {
  bool started = 1;
  bool initialized = 2;
}
