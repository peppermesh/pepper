name: ci

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Verify committed lockfile
        run: cargo metadata --locked --format-version 1 > /dev/null
      - name: Format
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --locked --workspace --all-targets -- -D warnings
      - name: Test
        # Keep ordinary unit and integration tests on one runner. The largest
        # multi-process QUIC/Raft contracts run below on isolated hosted
        # runners so their node churn and I/O cannot accumulate for 45+ minutes
        # in a single test process.
        run: |
          cargo test --locked --workspace -- --test-threads=1 \
            --skip s3_adaptive_erasure_transfer_plans_preserve_canonical_layout \
            --skip s3_catalog_survives_gateway_loss_and_concurrent_load \
            --skip s3_placement_owned_repair_fails_over_migrates_and_collects_extras \
            --skip s3_small_objects_pack_into_partitioned_ec_extents \
            --skip s3_streaming_six_plus_three_survives_three_missing_shards
      - name: Verify system-test workspace
        # The nested workspace keeps orchestration dependencies out of product
        # crates. Real three-node scenarios remain scheduled/manual; this step
        # checks the runner, cleanup guards, schemas, and deterministic fixtures.
        run: |
          cargo metadata --manifest-path system-tests/Cargo.toml --locked --format-version 1 > /dev/null
          cargo fmt --manifest-path system-tests/Cargo.toml -- --check
          cargo clippy --manifest-path system-tests/Cargo.toml --locked --all-targets -- -D warnings
          cargo test --manifest-path system-tests/Cargo.toml --locked

  multinode-contract:
    name: multinode ${{ matrix.test }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        test:
          - s3_adaptive_erasure_transfer_plans_preserve_canonical_layout
          - s3_catalog_survives_gateway_loss_and_concurrent_load
          - s3_placement_owned_repair_fails_over_migrates_and_collects_extras
          - s3_small_objects_pack_into_partitioned_ec_extents
          - s3_streaming_six_plus_three_survives_three_missing_shards
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Run isolated multinode contract
        run: >-
          cargo test --locked -p pepper-agent --test multinode
          "${{ matrix.test }}" -- --exact --nocapture --test-threads=1

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
      - name: Install cargo-audit
        run: cargo install cargo-audit --version 0.22.2 --locked
      - name: Audit dependencies
        run: |
          cargo audit
          cargo audit --file system-tests/Cargo.lock
