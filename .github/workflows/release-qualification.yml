name: release-qualification

on:
  workflow_dispatch:
    inputs:
      release_commit:
        description: "Exact release-candidate Git commit"
        required: true
      smoke_run_id:
        description: "Successful system-smoke workflow run ID"
        required: true
      functional_run_id:
        description: "Successful system-nightly workflow run ID"
        required: true
      chaos_run_id:
        description: "Successful system-chaos workflow run ID"
        required: true
      soak_run_id:
        description: "Successful system-soak workflow run ID"
        required: true
      wan_run_id:
        description: "Successful system-wan workflow run ID"
        required: true
      kvm_run_id:
        description: "Successful firecracker-host-gated workflow run ID"
        required: true

permissions:
  contents: read
  actions: read

jobs:
  qualify:
    runs-on: ubuntu-latest
    environment: release
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.release_commit }}
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
      - name: Validate source workflow attestations and download archives
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_COMMIT: ${{ inputs.release_commit }}
          RUN_IDS: >-
            ${{ inputs.smoke_run_id }} ${{ inputs.functional_run_id }}
            ${{ inputs.chaos_run_id }} ${{ inputs.soak_run_id }}
            ${{ inputs.wan_run_id }} ${{ inputs.kvm_run_id }}
        run: |
          set -euo pipefail
          mkdir -p qualification-input
          for run_id in $RUN_IDS; do
            data=$(gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${run_id}")
            test "$(jq -r .conclusion <<<"$data")" = success
            test "$(jq -r .head_sha <<<"$data")" = "$RELEASE_COMMIT"
            mkdir -p "qualification-input/$run_id"
            gh run download "$run_id" --repo "$GITHUB_REPOSITORY" --dir "qualification-input/$run_id"
          done
          mkdir -p qualification-report
          jq -n \
            --arg release_commit "$RELEASE_COMMIT" \
            --arg smoke "${{ inputs.smoke_run_id }}" \
            --arg functional "${{ inputs.functional_run_id }}" \
            --arg chaos "${{ inputs.chaos_run_id }}" \
            --arg soak "${{ inputs.soak_run_id }}" \
            --arg wan "${{ inputs.wan_run_id }}" \
            --arg kvm "${{ inputs.kvm_run_id }}" \
            '{schema_version:1, release_commit:$release_commit, workflow_runs:{smoke:$smoke,functional:$functional,chaos:$chaos,soak:$soak,wan:$wan,kvm:$kvm}}' \
            > qualification-report/source-runs.json
      - name: Generate and enforce release qualification report
        run: >-
          cargo run --manifest-path system-tests/Cargo.toml --locked --
          qualify --artifacts qualification-input
          --policy system-tests/ci/qualification-policy.json
          --output qualification-report/qualification.json
          --release-commit "${{ inputs.release_commit }}"
      - name: Archive qualification report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: pepper-0.2.0-qualification-${{ inputs.release_commit }}
          path: qualification-report/
          if-no-files-found: error
          retention-days: 90
