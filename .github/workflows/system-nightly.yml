# SPDX-License-Identifier: Apache-2.0

name: system-nightly

on:
  workflow_dispatch:
    inputs:
      seed:
        description: Optional exact reproduction seed
        required: false
        type: string
  schedule:
    - cron: "17 3 * * *"

permissions:
  contents: read

concurrency:
  group: system-nightly
  cancel-in-progress: false

jobs:
  functional:
    name: nightly docker ${{ matrix.scenario }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      max-parallel: 3
      matrix:
        include:
          - { scenario: BOOT-002, offset: 1 }
          - { scenario: BOOT-003, offset: 2 }
          - { scenario: BLOCK-001, offset: 3 }
          - { scenario: BLOCK-002, offset: 4 }
          - { scenario: REPL-001, offset: 5 }
          - { scenario: REPL-002, offset: 6 }
          - { scenario: REPL-003, offset: 7 }
          - { scenario: REPL-004, offset: 8 }
          - { scenario: REPL-005, offset: 9 }
          - { scenario: OBJECT-001, offset: 10 }
          - { scenario: DIR-001, offset: 11 }
          - { scenario: EC-001, offset: 12 }
          - { scenario: EC-002, offset: 13 }
          - { scenario: EC-003, offset: 14 }
          - { scenario: PIN-001, offset: 15 }
          - { scenario: PIN-002, offset: 16 }
          - { scenario: GC-001, offset: 17 }
          - { scenario: DAG-001, offset: 18 }
          - { scenario: CORRUPT-001, offset: 19 }
          - { scenario: NS-001, offset: 20 }
          - { scenario: NS-002, offset: 21 }
          - { scenario: NS-003, offset: 22 }
          - { scenario: NS-004, offset: 23 }
          - { scenario: RAFT-001, offset: 24 }
          - { scenario: RAFT-003, offset: 25 }
          - { scenario: BUCKET-001, offset: 26 }
          - { scenario: BUCKET-002, offset: 27 }
          - { scenario: BUCKET-003, offset: 28 }
          - { scenario: FS-001, offset: 29 }
          - { scenario: FS-002, offset: 30 }
          - { scenario: FS-003, offset: 31 }
          - { scenario: BACKUP-001, offset: 32 }
          - { scenario: BACKUP-002, offset: 33 }
          - { scenario: FAULT-001, offset: 34 }
          - { scenario: FAULT-003, offset: 35 }
          - { scenario: LIN-001, offset: 36 }
    env:
      TOKIO_WORKER_THREADS: "2"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Select archived deterministic seed
        id: seed
        env:
          REQUESTED_SEED: ${{ inputs.seed }}
          OFFSET: ${{ matrix.offset }}
        run: |
          if [ -n "$REQUESTED_SEED" ]; then
            seed="$REQUESTED_SEED"
          else
            day=$(( $(date -u +%s) / 86400 ))
            seed=$(( day * 1000 + GITHUB_RUN_NUMBER * 100 + OFFSET ))
          fi
          echo "seed=$seed" >> "$GITHUB_OUTPUT"
      - name: Run functional scenario
        run: >-
          cargo run --manifest-path system-tests/Cargo.toml --locked --
          run --scenario "${{ matrix.scenario }}" --seed "${{ steps.seed.outputs.seed }}"
          --backend docker --image "pepper-system-test:${GITHUB_SHA}"
      - name: Assert backend cleanup
        if: always()
        run: |
          containers=$(docker ps -aq --filter label=pepper.system-test.run)
          networks=$(docker network ls -q --filter label=pepper.system-test.run)
          volumes=$(docker volume ls -q --filter label=pepper.system-test.run)
          if [ -n "$containers$networks$volumes" ]; then
            echo "system-test resources leaked" >&2
            [ -z "$containers" ] || docker rm -f $containers || true
            [ -z "$networks" ] || docker network rm $networks || true
            [ -z "$volumes" ] || docker volume rm -f $volumes || true
            exit 1
          fi
      - name: Upload forensic artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: nightly-docker-${{ matrix.scenario }}-seed-${{ steps.seed.outputs.seed }}
          path: system-tests/artifacts/
          if-no-files-found: error
          retention-days: ${{ job.status == 'success' && 14 || 30 }}
