# SPDX-License-Identifier: Apache-2.0

# Manual-only legacy removal gate. Scheduled coverage moved to system-nightly and
# system-chaos; these timing-sensitive tests remain available until their
# replacement scenarios satisfy the historical 20-run/seven-day gate.
name: legacy-removal-gate

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: legacy-removal-gate
  cancel-in-progress: false

jobs:
  legacy:
    name: legacy ${{ matrix.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        include:
          - name: namespace contract (NS/BUCKET/FS replacements)
            command: cargo test --locked -p pepper-agent --test multinode transactional_namespace_http_contract -- --ignored --exact --nocapture --test-threads=1
          - name: churn soak (RAFT-002/NEMESIS-001/SOAK-001; PUB-002 pending)
            command: cargo test --locked -p pepper-agent --test multinode churn_partition_soak_harness -- --ignored --exact --nocapture --test-threads=1
          - name: real QUIC failover (NS-002/RAFT-001/RAFT-002 replacements)
            command: cargo test --locked -p pepper-consensus tests::authenticated_quic_discovers_routes_fails_over_and_stops_without_quorum -- --ignored --exact --nocapture --test-threads=1
          - name: learner replacement (RAFT-004 replacement)
            command: cargo test --locked -p pepper-consensus tests::learner_replacement_catches_up_during_writes_and_promotes_safely -- --ignored --exact --nocapture --test-threads=1
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Run retained legacy gate in isolation
        run: ${{ matrix.command }}
