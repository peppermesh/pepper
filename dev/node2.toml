[node]
name = "node-2"
listen_addr = "127.0.0.1:9002"
bulk_listen_addr = "127.0.0.1:9102"
bulk_advertise_addr = "127.0.0.1:9102"
failure_domain = "rack-b"

[node.placement_labels]
region = "dev"
zone = "dev-a"
rack = "rack-b"
disk_class = "ssd"

[data]
path = "./dev/node2-data"

[identity]
key_path = "./dev/node2-data/node.key"
generate_if_missing = true

[api]
bind_addr = "127.0.0.1:9081"

[storage.small_object_pack]
enabled = true
max_object_bytes = 4096
segment_bytes = 67108864
owners = 8
io_uring_entries = 256
group_commit_delay_microseconds = 200
group_commit_max_requests = 256
compaction_dead_percent = 50

[[storage.locations]]
path = "./dev/node2-storage"
max_capacity_bytes = 1000000000

[network]
bootstrap_peers = ["127.0.0.1:9001"]

[namespace]
enabled = true
consensus_enabled = true

[replication]
default_factor = 3
repair_interval_seconds = 30

[compute]
enabled = true
runtime = "firecracker"
max_concurrent_jobs = 1
work_dir = "./dev/node2-data/compute"
firecracker_binary = "/usr/local/bin/firecracker"
firecracker_jailer_binary = "/usr/local/bin/jailer"
firecracker_enable_jailer = false
firecracker_jailer_uid = 65534
firecracker_jailer_gid = 65534
firecracker_jailer_chroot_base = "./dev/jailer"
firecracker_strict_sandbox = true
firecracker_allow_untrusted_rootfs = false
# firecracker_allowed_rootfs_cids = ["cid://..."]
firecracker_memory_mib = 128
firecracker_vcpu_count = 1

[auth]
# cluster_secret_path = "./dev/cluster.secret"
# api_bearer_token = "dev-token"

[s3]
enabled = true
region = "us-east-1"
access_key_id = "pepper-dev"
secret_access_key_path = "./dev/s3.secret"
max_clock_skew_seconds = 900

[limits]
max_block_bytes = 67108864
max_object_bytes = 1073741824
max_compute_timeout_seconds = 600
http_requests_per_minute = 6000
rpc_requests_per_minute = 6000

[logging]
format = "pretty"
