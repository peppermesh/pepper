# Local-only, non-durable demo configuration. Do not reuse this data directory
# for a production or three-node deployment.
[demo]
single_node = true

[node]
name = "pepper-demo"
listen_addr = "127.0.0.1:9001"
bulk_listen_addr = "127.0.0.1:9101"
bulk_advertise_addr = "127.0.0.1:9101"
failure_domain = "demo"

[data]
path = "./dev/demo-data"

[identity]
key_path = "./dev/demo-data/node.key"
generate_if_missing = true

[api]
bind_addr = "127.0.0.1:9080"

[[storage.locations]]
path = "./dev/demo-storage"
max_capacity_bytes = 1000000000

[network]
bootstrap_peers = []

[namespace]
enabled = true
consensus_enabled = true

# This is set explicitly for clarity. Demo mode also forces the effective
# replication factor to one if this value is omitted or higher.
[replication]
default_factor = 1
repair_interval_seconds = 30

[compute]
enabled = false
runtime = "firecracker"
max_concurrent_jobs = 1
work_dir = "./dev/demo-data/compute"

[s3]
enabled = true
region = "us-east-1"
access_key_id = "pepper-demo"
secret_access_key_path = "./dev/s3.secret"
max_clock_skew_seconds = 900

[limits]
max_block_bytes = 67108864
max_object_bytes = 1073741824
http_requests_per_minute = 6000
rpc_requests_per_minute = 6000

[logging]
format = "pretty"
